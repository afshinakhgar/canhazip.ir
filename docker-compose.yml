version: '3.9'
services:
  api:
    build: .
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - app

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - app

networks:
  app:
    driver: bridge
