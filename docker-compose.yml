version: '3.9'
services:
  api:
    build: .
    container_name: canhazip_api
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - internal
      - gateway_net

  redis:
    image: redis:7-alpine
    container_name: canhazip_redis
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge
  gateway_net:
    external: true
